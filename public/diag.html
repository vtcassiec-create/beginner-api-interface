<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Petrichor — network test</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #1a1f2e; color: #e8e0d0;
           margin: 0; padding: 20px; line-height: 1.5; }
    h1 { font-size: 18px; }
    p { color: #9b9486; font-size: 14px; }
    button { font-size: 16px; padding: 12px 20px; border-radius: 8px; border: none;
             background: #d4a574; color: #1a1f2e; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.5; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 15px; }
    th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid #343c52; }
    .ok { color: #7abe78; }
    .fail { color: #cc6a5c; }
    #summary { margin-top: 16px; font-size: 14px; color: #d4a574; }
  </style>
</head>
<body>
  <h1>📡 Petrichor network test</h1>
  <p>This sends test uploads of increasing size to the server and reports which
     make it through. It stores nothing. Tap the button, let it finish, and tell
     Claude the results.</p>
  <button id="run">Run network test</button>
  <table id="results" hidden>
    <thead><tr><th>Size</th><th>Result</th><th>Time</th></tr></thead>
    <tbody></tbody>
  </table>
  <div id="summary"></div>

  <script>
    // Size sweep (instant replies) + delay sweep (server goes silent N sec
    // before replying — tests whether a quiet connection gets dropped).
    const SIZES = [
      [1024, "1 KB"], [128 * 1024, "128 KB"], [1024 * 1024, "1 MB"],
    ];
    const DELAYS = [0, 3, 6, 10, 20]; // seconds the server waits before replying
    const btn = document.getElementById("run");
    const table = document.getElementById("results");
    const tbody = table.querySelector("tbody");
    const summary = document.getElementById("summary");

    function row(label) {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${label}</td><td>…sending</td><td></td>`;
      tbody.appendChild(tr);
      return tr;
    }

    async function post(bytes, delay) {
      const body = "x".repeat(bytes);
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 30000);
      const start = performance.now();
      const url = "/api/echo" + (delay ? `?delay=${delay}` : "");
      try {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body,
          signal: ctrl.signal,
        });
        const ms = Math.round(performance.now() - start);
        const json = await res.json().catch(() => ({}));
        clearTimeout(t);
        return { ok: res.ok && json.received_bytes === bytes, ms,
                 detail: `HTTP ${res.status}` };
      } catch (e) {
        clearTimeout(t);
        const ms = Math.round(performance.now() - start);
        return { ok: false, ms, detail: ctrl.signal.aborted ? "timed out (30s)" : ("dropped: " + (e.message || e)) };
      }
    }

    function render(tr, r) {
      tr.children[1].innerHTML = r.ok ? `<span class="ok">✓ ok</span>` : `<span class="fail">✗ ${r.detail}</span>`;
      tr.children[2].textContent = r.ms + " ms";
    }

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      table.hidden = false;
      tbody.innerHTML = "";
      summary.textContent = "";

      // 1) size sweep, instant replies
      tbody.appendChild(Object.assign(document.createElement("tr"), { innerHTML: "<td colspan=3 style='color:#9b9486;padding-top:12px'>— size (instant reply) —</td>" }));
      for (const [bytes, label] of SIZES) render(row(label), await post(bytes, 0));

      // 2) delay sweep, tiny body, server stays silent N seconds
      tbody.appendChild(Object.assign(document.createElement("tr"), { innerHTML: "<td colspan=3 style='color:#9b9486;padding-top:12px'>— quiet wait before reply —</td>" }));
      let lastDelayOk = "0s", firstDelayFail = null;
      for (const d of DELAYS) {
        const r = await post(1024, d);
        render(row(d + "s wait"), r);
        if (r.ok) lastDelayOk = d + "s"; else if (firstDelayFail === null) firstDelayFail = d + "s";
      }
      summary.textContent = firstDelayFail
        ? `Connection survives a quiet wait up to ${lastDelayOk}, then fails at ${firstDelayFail}. Read this to Claude!`
        : `Survived quiet waits all the way to 20s ✓. Read this to Claude.`;
      btn.disabled = false;
    });
  </script>
</body>
</html>
